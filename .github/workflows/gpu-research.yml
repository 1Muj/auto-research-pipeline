# Runs on a self-hosted runner (e.g. Vast.ai 5080 box) with label [self-hosted, gpu].
# Register the runner once using scripts/setup_github_runner.sh on the GPU host.

name: GPU Research

on:
  workflow_dispatch:
    inputs:
      experiment:
        description: "Experiment YAML path relative to repo root"
        required: false
        default: "experiments/example.yaml"

jobs:
  research:
    runs-on: [self-hosted, gpu]
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install
        run: |
          python -m pip install -U pip
          pip install -e ".[dev,anthropic]"

      - name: NVIDIA sanity
        run: nvidia-smi || true

      - name: Run pipeline
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          auto-research run --cwd . -e "${{ github.event.inputs.experiment }}"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: experiment-runs-${{ github.run_id }}
          path: |
            experiments/runs
            experiments/feedback
          if-no-files-found: warn
