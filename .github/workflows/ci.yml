# CI for exp (and main if merged): install package and run the bundled linear regression experiment.
name: CI

on:
  push:
    branches: [main, exp]
  pull_request:
    branches: [main, exp]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install
        run: |
          python -m pip install -U pip
          pip install -e .

      - name: Run experiment
        run: |
          auto-research run --cwd . -e experiments/linear_regression.yaml

